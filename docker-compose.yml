services:
  gatekeeper:
    build: .
    container_name: gatekeeper
    restart: unless-stopped
    ports:
      - "${GATEKEEPER_PORT:-5023}:5000"
    volumes:
      - ./data:/app/data
      # Mount your media library paths (read-only for source, read-write for kids library)
      - ${MEDIA_MOVIES_PATH:-/path/to/media/movies}:/media/movies:ro
      - ${MEDIA_TV_PATH:-/path/to/media/tv}:/media/tv:ro
      - ${MEDIA_KIDS_MOVIES_PATH:-/path/to/media/kids-approved/movies}:/media/kids-approved/movies:rw
      - ${MEDIA_KIDS_TV_PATH:-/path/to/media/kids-approved/tv}:/media/kids-approved/tv:rw
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/gatekeeper.db
    # Required on Linux for the container to reach services on the host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
