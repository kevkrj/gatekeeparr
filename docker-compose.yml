services:
  gatekeeper:
    build: .
    container_name: gatekeeper
    restart: unless-stopped
    ports:
      - "5023:5000"
    volumes:
      - ./data:/app/data
      - /mnt/nas/media/movies:/media/movies:ro
      - /mnt/nas/media/tv:/media/tv:ro
      - /mnt/nas/media/kids-approved/movies:/media/kids-approved/movies:rw
      - /mnt/nas/media/kids-approved/tv:/media/kids-approved/tv:rw
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/gatekeeper.db
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
