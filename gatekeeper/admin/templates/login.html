<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gatekeeparr - Sign In</title>
    <link rel="stylesheet" href="/static/css/admin.css">
    <style>
        .login-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem;
        }

        .login-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
        }

        .login-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-header .brand-icon {
            font-size: 2.5rem;
            display: block;
            margin-bottom: 0.5rem;
        }

        .login-header h1 {
            font-size: 1.5rem;
            margin-bottom: 0.25rem;
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .login-form .form-group {
            margin-bottom: 1.25rem;
        }

        .login-form label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .login-form input[type="text"],
        .login-form input[type="password"] {
            width: 100%;
            background: var(--bg-secondary);
            color: var(--text-primary);
            border: 1px solid var(--border);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .login-form input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .login-btn {
            width: 100%;
            background: var(--accent);
            color: white;
            border: none;
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .login-btn:hover {
            background: var(--accent-hover);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .login-error {
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 0.75rem 1rem;
            border-radius: 6px;
            margin-bottom: 1.25rem;
            font-size: 0.875rem;
            display: none;
        }

        .login-error.visible {
            display: block;
        }

        .auth-toggle {
            display: flex;
            gap: 0;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }

        .auth-toggle-btn {
            flex: 1;
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: none;
            padding: 0.6rem 1rem;
            font-size: 0.875rem;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
        }

        .auth-toggle-btn + .auth-toggle-btn {
            border-left: 1px solid var(--border);
        }

        .auth-toggle-btn.active {
            background: var(--accent);
            color: white;
        }

        .auth-toggle-btn:hover:not(.active) {
            background: var(--bg-card);
        }

        .jellyseerr-note {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <div class="login-card">
            <div class="login-header">
                <span class="brand-icon">&#x1f6e1;&#xfe0f;</span>
                <h1>Gatekeeparr</h1>
                <p>Sign in with your Jellyseerr / Seerr account</p>
            </div>

            <div id="login-error" class="login-error"></div>

            <form id="login-form" class="login-form" method="POST" action="/login">
                <div class="form-group">
                    <label>Sign in with</label>
                    <div class="auth-toggle">
                        <button type="button" class="auth-toggle-btn active" data-auth="jellyfin">Jellyfin</button>
                        <button type="button" class="auth-toggle-btn" data-auth="local">Seerr (Local)</button>
                    </div>
                    <input type="hidden" id="auth_type" name="auth_type" value="jellyfin">
                </div>
                <div class="form-group">
                    <label for="email" id="email-label">Username</label>
                    <input type="text" id="email" name="email" required autocomplete="username" autofocus>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required autocomplete="current-password">
                </div>
                <button type="submit" class="login-btn" id="login-btn">Sign In</button>
            </form>

            <div class="jellyseerr-note">
                Authenticated via Jellyseerr / Seerr
            </div>
        </div>
    </div>

    <script src="/static/js/login.js"></script>
</body>
</html>
